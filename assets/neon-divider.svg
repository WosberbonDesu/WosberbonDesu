<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 30">
  <defs>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#00ffc8;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Main line -->
  <line x1="50" y1="15" x2="850" y2="15" stroke="url(#neon1)" stroke-width="1.5" filter="url(#gl)"/>
  
  <!-- Center diamond -->
  <polygon points="450,5 460,15 450,25 440,15" fill="#00d4ff" filter="url(#gl)" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Side dots -->
  <circle cx="200" cy="15" r="2.5" fill="#a78bfa" filter="url(#gl)" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="15" r="2.5" fill="#a78bfa" filter="url(#gl)" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="15" r="1.5" fill="#00ffc8" filter="url(#gl)" opacity="0.6"/>
  <circle cx="600" cy="15" r="1.5" fill="#00ffc8" filter="url(#gl)" opacity="0.6"/>
</svg>
